server.port=8080
spring.application.name=main-service
spring.datasource.url=jdbc:postgresql://localhost:5433/main_service
spring.datasource.username=main_user
spring.datasource.password=main_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
statistics.server.url=http://localhost:9090
logging.level.ru.practicum.main=DEBUG
logging.level.org.springframework.web=INFO
management.endpoints.web.exposure.include=health,info
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss